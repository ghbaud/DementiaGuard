<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #4A4A4A;
      background: #FAFAF5;
    }
    .header {
      background: #5B6E4E;
      color: white;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: bold;
    }
    .passcode-gate, .settings {
      padding: 16px;
    }
    .passcode-gate { display: block; }
    .settings { display: none; }
    .unlocked .passcode-gate { display: none; }
    .unlocked .settings { display: block; }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      color: #5B6E4E;
    }
    input[type="password"], input[type="text"], select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #E5DFD3;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
      font-family: inherit;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    button {
      background: #5B6E4E;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #4A5D3F; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider {
      background: #5B6E4E;
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    .error {
      color: #c0392b;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .help {
      color: #8A7F6B;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 12px;
    }
    .section {
      margin-bottom: 16px;
    }
    .saved {
      color: #5B6E4E;
      font-size: 12px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .btn-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">Site Throttle</div>

  <div class="passcode-gate">
    <p style="margin-bottom: 12px; color: #6B6155;">Enter passcode to access settings:</p>
    <input type="password" id="passcode-input" maxlength="10" placeholder="Passcode">
    <div class="error" id="passcode-error" style="display:none;">Incorrect passcode</div>
    <button id="passcode-btn">Unlock</button>
  </div>

  <div class="settings">
    <div class="section">
      <div class="toggle-row">
        <label style="margin-bottom: 0;">Throttling Enabled</label>
        <label class="toggle">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <label for="level-select">Slowdown Level</label>
      <select id="level-select">
        <option value="mild">Mild (2-3 second delays)</option>
        <option value="moderate">Moderate (5-8 second delays)</option>
        <option value="aggressive">Aggressive (10-15 second delays)</option>
      </select>
    </div>

    <div class="section">
      <label for="sites-input">Throttled Sites</label>
      <p class="help">One domain per line. Subdomains are included automatically.</p>
      <textarea id="sites-input"></textarea>
    </div>

    <div class="section">
      <label for="new-passcode">Change Passcode</label>
      <input type="text" id="new-passcode" placeholder="Enter new passcode">
    </div>

    <div class="btn-row">
      <button id="save-btn">Save Settings</button>
      <span class="saved" id="saved-msg">Saved</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
